<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;600&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1200px;height:630px;overflow:hidden;font-family:"Inter",sans-serif;
    background:#06070d;color:#eef0f8;position:relative}
  .glow{position:absolute;inset:0;
    background:radial-gradient(620px 520px at 80% 30%,rgba(124,92,255,.4),transparent 62%),
               radial-gradient(420px 420px at 78% 28%,rgba(54,197,224,.22),transparent 60%)}
  .orb{position:absolute;right:90px;top:50%;transform:translateY(-50%);width:360px;height:360px;border-radius:50%;
    border:2px solid rgba(124,92,255,.5);
    background:conic-gradient(from 210deg, #7c5cff 0deg 70deg, rgba(20,16,25,.9) 70deg 130deg, #36c5e0 130deg 360deg);
    -webkit-mask:radial-gradient(circle, transparent 52%, #000 53%);mask:radial-gradient(circle, transparent 52%, #000 53%);
    box-shadow:0 0 80px rgba(124,92,255,.4)}
  .dot{position:absolute;right:235px;top:50%;transform:translate(50%,-50%);width:70px;height:70px;border-radius:50%;background:#06070d;border:2px solid rgba(124,92,255,.4)}
  .wrap{position:relative;padding:96px 90px;z-index:2;max-width:760px;height:100%;display:flex;flex-direction:column;justify-content:center}
  .tag{display:inline-block;align-self:flex-start;font-size:18px;letter-spacing:.18em;text-transform:uppercase;
    color:#c3b6ff;border:1px solid rgba(124,92,255,.5);border-radius:999px;padding:8px 20px;margin-bottom:30px}
  h1{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:66px;line-height:1.04;letter-spacing:-.02em}
  h1 .g{background:linear-gradient(120deg,#7c5cff,#36c5e0);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  p{margin-top:26px;font-size:25px;color:#c5cadb;max-width:600px}
  .brand{position:absolute;left:90px;bottom:54px;font-family:"Space Grotesk",sans-serif;font-weight:500;font-size:22px;color:#8b90a8;z-index:2}
  .brand b{color:#eef0f8}
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="orb"></div>
  <div class="dot"></div>
  <div class="wrap">
    <span class="tag">Diagnóstico gratuito · 7 minutos</span>
    <h1>O gargalo que você <span class="g">não vê</span> é o que mais custa.</h1>
    <p>Revele o ponto cego que trava o crescimento do seu negócio.</p>
  </div>
  <div class="brand">ponto <b>cego</b></div>
</body>
</html>
